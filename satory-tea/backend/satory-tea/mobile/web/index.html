<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Satori Tea</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: sans-serif;
    }

    .phone-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .phone-label {
      color: #555;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .phone-frame {
      width: 390px;
      height: 844px;
      background: #0A0A0A;
      border-radius: 50px;
      border: 8px solid #2a2a2a;
      box-shadow:
        0 0 0 1px #111,
        0 40px 80px rgba(0,0,0,0.8),
        inset 0 0 0 1px #333;
      position: relative;
      overflow: hidden;
    }

    /* Notch */
    .phone-frame::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 30px;
      background: #2a2a2a;
      border-radius: 0 0 20px 20px;
      z-index: 9999;
    }

    /* Side buttons */
    .phone-frame::after {
      content: '';
      position: absolute;
      right: -10px;
      top: 120px;
      width: 4px;
      height: 60px;
      background: #2a2a2a;
      border-radius: 2px;
      box-shadow: 0 80px 0 #2a2a2a;
    }

    .phone-screen {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 42px;
      overflow: hidden;
    }

    /* Scale down for smaller monitors */
    @media (max-height: 920px) {
      .phone-frame {
        width: 340px;
        height: 736px;
      }
    }

    @media (max-height: 800px) {
      .phone-frame {
        width: 300px;
        height: 650px;
      }
    }
  </style>
</head>
<body>
  <div class="phone-wrap">
    <div class="phone-label">Satori Tea — Preview</div>
    <div class="phone-frame">
      <iframe
        class="phone-screen"
        src="http://localhost:8081"
        title="Satori App"
      ></iframe>
    </div>
  </div>
</body>
</html>
