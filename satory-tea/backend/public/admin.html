<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Satori Tea — Админ</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0A0A;
  --surface:#1A1A1A;
  --surface2:#141414;
  --border:#2A2A2A;
  --gold:#C9A84C;
  --gold-h:#E8C96A;
  --gold-dim:rgba(201,168,76,.15);
  --danger:#E53935;
  --green:#4CAF50;
  --orange:#e67e22;
  --text:#FFFFFF;
  --muted:#888888;
  --muted-l:#AAAAAA;
}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── Layout ── */
#app{display:flex;min-height:100vh}
nav{width:230px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
nav .logo{padding:24px 20px 20px;border-bottom:1px solid var(--border)}
nav .logo-title{font-size:20px;font-weight:800;color:var(--gold);letter-spacing:.5px}
nav .logo-sub{font-size:11px;color:var(--muted);margin-top:3px;letter-spacing:1.5px;text-transform:uppercase}
nav a{display:flex;align-items:center;gap:10px;padding:11px 20px;color:var(--muted-l);text-decoration:none;font-size:14px;transition:all .15s;cursor:pointer;border-left:3px solid transparent;margin:2px 0}
nav a:hover{color:var(--text);background:rgba(255,255,255,.04)}
nav a.active{color:var(--gold);background:var(--gold-dim);border-left-color:var(--gold)}
nav .logout{margin-top:auto;padding:16px 20px;border-top:1px solid var(--border)}
nav .logout button{background:none;border:1px solid var(--border);color:var(--muted);padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;width:100%;transition:all .15s}
nav .logout button:hover{border-color:var(--danger);color:var(--danger)}
main{flex:1;padding:32px;overflow-y:auto;background:var(--bg)}

/* ── Login ── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px;width:380px}
.login-box h1{font-size:24px;font-weight:800;margin-bottom:6px;color:var(--gold)}
.login-box p{color:var(--muted);font-size:14px;margin-bottom:28px}

/* ── Cards ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:20px}
.card h2{font-size:16px;font-weight:700;margin-bottom:16px;color:var(--text)}

/* ── Tables ── */
table{width:100%;border-collapse:collapse;font-size:14px}
th{text-align:left;padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border);font-weight:600;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.8px}
td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--muted-l)}
td strong{color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.025)}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s}
.btn-primary{background:var(--gold);color:#0A0A0A}
.btn-primary:hover{background:var(--gold-h)}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:6px}
.btn-danger{background:rgba(229,57,53,.15);color:var(--danger);border:1px solid rgba(229,57,53,.3)}
.btn-danger:hover{background:var(--danger);color:#fff}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted-l)}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold)}
.btn-success{background:rgba(76,175,80,.15);color:var(--green);border:1px solid rgba(76,175,80,.3)}

/* ── Forms ── */
.form-group{margin-bottom:16px}
label{display:block;font-size:12px;font-weight:600;margin-bottom:6px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
input[type=text],input[type=number],input[type=date],input[type=password],select,textarea{
  width:100%;padding:10px 13px;border:1px solid var(--border);border-radius:8px;
  font-size:14px;background:var(--surface2);color:var(--text);outline:none;transition:border-color .15s
}
input:focus,select:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-dim)}
select option{background:var(--surface2)}
textarea{resize:vertical;min-height:100px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-actions{display:flex;gap:10px;margin-top:20px}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;width:660px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal h3{font-size:18px;font-weight:700;margin-bottom:20px;color:var(--text)}
.modal-close{float:right;background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);line-height:1;transition:color .15s}
.modal-close:hover{color:var(--text)}

/* ── Badges ── */
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.3px}
.badge-green{background:rgba(76,175,80,.15);color:#4CAF50;border:1px solid rgba(76,175,80,.3)}
.badge-red{background:rgba(229,57,53,.15);color:#E53935;border:1px solid rgba(229,57,53,.3)}
.badge-blue{background:rgba(33,150,243,.15);color:#64B5F6;border:1px solid rgba(33,150,243,.3)}
.badge-orange{background:rgba(201,168,76,.15);color:var(--gold);border:1px solid rgba(201,168,76,.3)}

/* ── Page header ── */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.page-header h1{font-size:22px;font-weight:800;color:var(--text)}

/* ── Filters ── */
.filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.filters input,.filters select{width:auto;flex:1;min-width:160px}

/* ── Images ── */
.img-thumb{width:48px;height:48px;object-fit:cover;border-radius:8px;border:1px solid var(--border)}
.img-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.img-item{position:relative}
.img-item img{width:80px;height:80px;object-fit:cover;border-radius:8px;border:1px solid var(--border)}
.img-item .del-img{position:absolute;top:-6px;right:-6px;background:var(--danger);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* ── Gallery ── */
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-top:16px}
.gallery-item{background:var(--surface2);border:1px solid var(--border);border-radius:12px;overflow:hidden;position:relative;transition:border-color .15s}
.gallery-item:hover{border-color:var(--gold)}
.gallery-item img{width:100%;aspect-ratio:1;object-fit:cover;display:block}
.gallery-item .gi-caption{padding:8px 10px;font-size:12px;color:var(--muted-l)}
.gallery-item .gi-actions{display:flex;gap:4px;padding:0 8px 8px}
.gallery-item .gi-order{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.7);color:var(--gold);font-size:11px;font-weight:700;padding:2px 8px;border-radius:8px;border:1px solid var(--gold-dim)}

/* ── Toast ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:12px 20px;border-radius:10px;font-size:14px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.toast.show{opacity:1}

/* ── Misc ── */
.empty{text-align:center;padding:48px;color:var(--muted);font-size:14px}
#loading{display:none;position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--gold-h));z-index:200;animation:ld 1s infinite}
@keyframes ld{0%{width:0;left:0}50%{width:60%;left:20%}100%{width:0;left:100%}}
code{background:var(--surface2);border:1px solid var(--border);padding:2px 7px;border-radius:5px;font-size:12px;color:var(--gold)}

/* ── Касса ── */
.cashier-wrap{display:flex;gap:24px;flex-wrap:wrap}
.cashier-scanner{flex:1;min-width:280px;max-width:400px}
.cashier-info{flex:1;min-width:280px}
#qr-reader{border-radius:12px;overflow:hidden;border:1px solid var(--border);background:var(--surface2)}
#qr-reader video{border-radius:12px}
.guest-card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:20px;display:none}
.guest-card.visible{display:block}
.guest-name{font-size:20px;font-weight:700;color:var(--text);margin-bottom:4px}
.guest-phone{color:var(--muted);font-size:13px;margin-bottom:16px}
.guest-row{display:flex;justify-content:space-between;align-items:center;background:var(--bg);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.guest-row-label{color:var(--muted);font-size:13px}
.guest-row-value{color:var(--gold);font-size:16px;font-weight:700}
.accrue-block{margin-top:16px;border-top:1px solid var(--border);padding-top:16px}
.accrue-label{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.accrue-row{display:flex;gap:8px;align-items:flex-end}
.accrue-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 13px;color:var(--text);font-size:16px;outline:none;transition:border-color .15s}
.accrue-input:focus{border-color:var(--gold)}
.accrue-preview{font-size:13px;margin-top:6px;min-height:18px;color:var(--gold)}
.accrue-preview.warn{color:var(--danger)}
.accrue-result{border-radius:10px;padding:12px 14px;margin-top:10px;font-size:14px;font-weight:600;display:none}
.accrue-result.ok{background:rgba(76,175,80,.12);color:#4CAF50;border:1px solid rgba(76,175,80,.3)}
.accrue-result.err{background:rgba(229,57,53,.12);color:var(--danger);border:1px solid rgba(229,57,53,.3)}
.scan-hint{color:var(--muted);font-size:13px;text-align:center;margin-top:10px}
.qr-error{background:rgba(229,57,53,.1);border:1px solid rgba(229,57,53,.3);border-radius:12px;padding:16px;color:var(--danger);text-align:center;display:none;margin-top:12px}
.qr-error.visible{display:block}
</style>
</head>
<body>
<div id="loading"></div>
<div id="toast" class="toast"></div>

<!-- Login -->
<div id="login-screen" style="display:none">
  <div class="login-box">
    <h1>🍵 Satori Tea</h1>
    <p>Панель управления</p>
    <div class="form-group"><label>Логин</label><input id="l-login" type="text" placeholder="admin"></div>
    <div class="form-group"><label>Пароль</label><input id="l-pass" type="password" placeholder="••••••"></div>
    <div id="l-err" style="color:var(--danger);font-size:13px;margin-bottom:12px;display:none"></div>
    <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Войти</button>
  </div>
</div>

<!-- App -->
<div id="app" style="display:none">
  <nav>
    <div class="logo">
      <div class="logo-title">Satori</div>
      <div class="logo-sub">Панель управления</div>
    </div>
    <a onclick="showPage('events')"     id="nav-events">События</a>
    <a onclick="showPage('news')"       id="nav-news">Новости</a>
    <a onclick="showPage('products')"   id="nav-products">Товары</a>
    <a onclick="showPage('gallery')"    id="nav-gallery">Галерея</a>
    <a onclick="showPage('orders')"     id="nav-orders">Заказы</a>
    <a onclick="showPage('cashier')"    id="nav-cashier">Касса</a>
    <a onclick="showPage('settings')"   id="nav-settings">Настройки</a>
    <a onclick="showPage('sync')"       id="nav-sync">Синхронизация</a>
    <div class="logout"><button onclick="logout()">Выйти</button></div>
  </nav>
  <main id="main"></main>
</div>

<div id="modal-wrap"></div>

<script>
// ── API ──────────────────────────────────────────────────────
let TOKEN = localStorage.getItem('admin_token') || '';

async function api(method, url, body, isForm) {
  showLoad(true);
  try {
    const opts = { method, headers: { Authorization: `Bearer ${TOKEN}` } };
    if (body && !isForm) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
    else if (isForm) opts.body = body;
    const r = await fetch(url, opts);
    const d = await r.json().catch(() => ({}));
    if (r.status === 401 || r.status === 403) { logout(); return null; }
    if (!r.ok) throw new Error(d.error || `HTTP ${r.status}`);
    return d;
  } catch(e) { toast(e.message, 'err'); return null; }
  finally { showLoad(false); }
}

// ── Utils ─────────────────────────────────────────────────────
function showLoad(v) { document.getElementById('loading').style.display = v ? 'block' : 'none'; }
let _tt; function toast(m, t='ok') {
  const el = document.getElementById('toast');
  el.textContent = m; el.style.background = t==='err' ? 'var(--danger)' : '#2c1a0e';
  el.classList.add('show'); clearTimeout(_tt); _tt = setTimeout(() => el.classList.remove('show'), 3000);
}
function fmtDate(d) { return d ? new Date(d).toLocaleDateString('ru-RU') : '—'; }
function fmtPrice(p) { return p ? `${Number(p).toLocaleString('ru')} ₽` : '—'; }
function openModal(html) { document.getElementById('modal-wrap').innerHTML = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">${html}</div>`; }
function closeModal() { document.getElementById('modal-wrap').innerHTML = ''; }

// ── Auth ──────────────────────────────────────────────────────
async function doLogin() {
  const login = document.getElementById('l-login').value.trim();
  const pass  = document.getElementById('l-pass').value;
  const err   = document.getElementById('l-err');
  err.style.display = 'none';
  try {
    const r = await fetch('/api/admin/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({login, password: pass}) });
    const d = await r.json();
    if (!d.token) throw new Error(d.error || 'Ошибка');
    TOKEN = d.token; localStorage.setItem('admin_token', TOKEN); boot();
  } catch(e) { err.textContent = e.message; err.style.display = 'block'; }
}
document.addEventListener('keydown', e => { if (e.key==='Enter' && document.getElementById('login-screen').style.display!=='none') doLogin(); });
function logout() { TOKEN=''; localStorage.removeItem('admin_token'); document.getElementById('app').style.display='none'; document.getElementById('login-screen').style.display='flex'; }
function boot() { document.getElementById('login-screen').style.display='none'; document.getElementById('app').style.display='flex'; showPage('events'); }

function showPage(p) {
  ['events','news','products','gallery','orders','cashier','settings','sync'].forEach(x => document.getElementById(`nav-${x}`)?.classList.toggle('active', x===p));
  if (p==='events')   renderEvents();
  if (p==='news')     renderNews();
  if (p==='products') renderProducts();
  if (p==='gallery')  renderGallery();
  if (p==='orders')   renderOrders();
  if (p==='cashier')  renderCashier();
  if (p==='settings') renderSettings();
  if (p==='sync')     renderSync();
}

// ════════════════════════════════════════════════════════════
// EVENTS
// ════════════════════════════════════════════════════════════
let _eventsAutoRefresh = null;

async function renderEvents() {
  // Автообновление каждые 30 секунд
  if (_eventsAutoRefresh) clearInterval(_eventsAutoRefresh);
  _eventsAutoRefresh = setInterval(() => {
    if (document.getElementById('nav-events')?.classList.contains('active')) {
      api('GET', '/api/admin/events').then(events => {
        if (events) renderEventsTable(events);
      });
    } else {
      clearInterval(_eventsAutoRefresh);
    }
  }, 30000);
  document.getElementById('main').innerHTML = `
    <div class="page-header">
      <h1>📅 События</h1>
      <div style="display:flex;gap:10px">
        <button class="btn btn-ghost btn-sm" onclick="showSchedulerStats()">📊 Планировщик</button>
        <button class="btn btn-primary" onclick="openEventForm()">+ Добавить</button>
      </div>
    </div>
    <div class="card" id="ev-wrap"><p class="empty">Загрузка...</p></div>`;
  const events = await api('GET', '/api/admin/events');
  if (!events) return;
  renderEventsTable(events);
}

function renderEventsTable(events) {
  const wrap = document.getElementById('ev-wrap');
  if (!wrap) return;
  if (!events.length) { wrap.innerHTML = '<p class="empty">Событий пока нет</p>'; return; }
  wrap.innerHTML = `<table>
    <thead><tr><th>Название</th><th>Дата</th><th>Цена</th><th>Мест</th><th>Публикация</th><th>Push</th><th>Статус</th><th></th></tr></thead>
    <tbody>${events.map(e => {
      // Бейдж публикации
      let publishBadge = '';
      if (e.scheduled_publish_time && !e.is_published) {
        const publishDate = new Date(e.scheduled_publish_time);
        const now = new Date();
        if (publishDate <= now) {
          publishBadge = `<span class="badge badge-orange" title="Ожидает публикации">⏳ Ожидает</span>`;
        } else {
          publishBadge = `<span class="badge badge-blue" title="Запланирована на ${publishDate.toLocaleString('ru')}">📅 ${publishDate.toLocaleDateString('ru')}</span>`;
        }
      } else if (e.is_published !== false) {
        publishBadge = `<span class="badge badge-green" title="Опубликовано">✓ Опубликовано</span>`;
      } else {
        publishBadge = `<span class="badge badge-red" title="Черновик">📝 Черновик</span>`;
      }

      // Бейдж push-уведомлений
      let pushBadge = '';
      if (e.scheduled_push_time) {
        if (e.push_sent) {
          pushBadge = `<span class="badge badge-green" title="Push отправлен ${fmtDate(e.last_push_sent)}">✓ Отправлен</span>`;
        } else {
          const pushDate = new Date(e.scheduled_push_time);
          const now = new Date();
          if (pushDate <= now) {
            pushBadge = `<span class="badge badge-orange" title="Ожидает отправки">⏳ Ожидает</span>`;
          } else {
            pushBadge = `<span class="badge badge-blue" title="Запланирован на ${pushDate.toLocaleString('ru')}">📅 ${pushDate.toLocaleDateString('ru')}</span>`;
          }
        }
      } else {
        pushBadge = `<span class="badge badge-red">—</span>`;
      }
      
      return `<tr>
        <td><strong>${e.title}</strong>${e.image_url ? `<br><img src="${e.image_url}" class="img-thumb" style="margin-top:4px">` : ''}</td>
        <td>${fmtDate(e.date)}</td><td>${fmtPrice(e.price)}</td>
        <td>
          <a href="#" onclick="openEventParticipants('${e._id}', '${e.title.replace(/'/g, "\\'")}'); return false;" style="text-decoration: underline; color: var(--gold); font-weight: 600;">
            ${e.seats_taken||0}
          </a> / ${e.seats_total||'∞'}
        </td>
        <td>${publishBadge}</td>
        <td>${pushBadge}</td>
        <td><span class="badge ${e.is_active!==false?'badge-green':'badge-red'}">${e.is_active!==false?'Активно':'Скрыто'}</span></td>
        <td style="white-space:nowrap">
          <button class="btn btn-ghost btn-sm" onclick="openEventForm('${e._id}')">✏️</button>
          <button class="btn btn-ghost btn-sm" onclick="openPublishForm('${e._id}')" title="Управление публикацией">📋</button>
          <button class="btn btn-ghost btn-sm" onclick="openPushForm('${e._id}')" title="Push-уведомления">📱</button>
          <button class="btn btn-ghost btn-sm" onclick="toggleEvent('${e._id}')">${e.is_active!==false?'🙈':'👁️'}</button>
          <button class="btn btn-danger btn-sm" onclick="deleteEvent('${e._id}')">🗑️</button>
        </td></tr>`;
    }).join('')}</tbody></table>`;
}

async function openEventParticipants(eventId, eventTitle) {
  openModal(`<div class="modal" style="width:750px">
    <button class="modal-close" onclick="closeModal()">×</button>
    <h3>👥 Записи на событие: "${eventTitle}"</h3>
    <div id="participants-wrap" style="margin-top:20px"><p class="empty">Загрузка...</p></div>
  </div>`);

  const list = await api('GET', `/api/admin/events/${eventId}/registrations`);
  const wrap = document.getElementById('participants-wrap');
  if (!wrap) return;
  if (!list) { wrap.innerHTML = '<p class="empty" style="color:var(--danger)">Ошибка загрузки записей</p>'; return; }
  if (!list.length) { wrap.innerHTML = '<p class="empty">На это событие пока никто не записался</p>'; return; }

  wrap.innerHTML = `<table>
    <thead><tr><th>Гость</th><th>Телефон</th><th>Статус оплаты</th><th></th></tr></thead>
    <tbody>${list.map(r => {
      return `<tr>
        <td><strong>${r.name}</strong></td>
        <td style="font-family:monospace">${r.phone}</td>
        <td>
          <select class="status-select" onchange="changeRegistrationPayment('${eventId}', '${r._id}', this.value)" style="background:var(--card); color:var(--text); border:1px solid var(--border); padding:4px 8px; border-radius:6px; font-size:13px; font-weight:600;">
            <option value="unpaid" ${r.payment_status==='unpaid'?'selected':''} style="color:var(--danger)">❌ Не оплачено</option>
            <option value="paid" ${r.payment_status==='paid'?'selected':''} style="color:var(--success)">✓ Оплачено</option>
          </select>
        </td>
        <td>

async function saveEvent(id) {
  const title = document.getElementById('ef-title').value.trim();
  const date  = document.getElementById('ef-date').value;
  if (!title || !date) { toast('Заполните название и дату','err'); return; }
  
  let image_url = document.getElementById('ef-imgurl').value.trim();
  const f = document.getElementById('ef-img').files[0];
  if (f) { 
    const fd=new FormData(); 
    fd.append('image',f); 
    const u=await api('POST','/api/admin/upload/image?type=event',fd,true); 
    if(u) image_url=u.url; 
  }
  
  // Собираем данные push-уведомлений
  const pushTemplate = document.getElementById('ef-push-template').value.trim();
  const pushTarget = document.getElementById('ef-push-target').value;
  const pushSchedule = document.getElementById('ef-push-schedule').value;
  
  // Собираем данные публикации
  const publishStatus = document.getElementById('ef-publish-status').value;
  const publishTime = document.getElementById('ef-publish-time').value;
  
  let publishData = {};
  if (publishStatus === 'now') {
    publishData = { is_published: true, scheduled_publish_time: null, auto_publish: false };
  } else if (publishStatus === 'scheduled') {
    if (!publishTime) {
      toast('Укажите время публикации', 'err');
      return;
    }
    publishData = { 
      is_published: false, 
      scheduled_publish_time: new Date(publishTime).toISOString(),
      auto_publish: true 
    };
  } else if (publishStatus === 'draft') {
    publishData = { is_published: false, scheduled_publish_time: null, auto_publish: false };
  }
  
  const body = { 
    title, 
    date, 
    price: +document.getElementById('ef-price').value||0,
    seats_total: +document.getElementById('ef-seats').value||0,
    description: document.getElementById('ef-desc').value,
    conditions: document.getElementById('ef-cond').value,
    is_active: document.getElementById('ef-active').value==='true', 
    image_url,
    // Поля для push-уведомлений
    push_template: pushTemplate,
    push_target: pushTarget,
    scheduled_push_time: pushSchedule ? new Date(pushSchedule).toISOString() : null,
    // Поля для публикации
    ...publishData
  };
  
  const r = id ? await api('PUT',`/api/admin/events/${id}`,body) : await api('POST','/api/admin/events',body);
  if (r) { 
    closeModal(); 
    
    // Показываем соответствующие сообщения
    if (publishStatus === 'scheduled') {
      const scheduleDate = new Date(publishTime);
      toast(`Событие создано. Публикация запланирована на ${scheduleDate.toLocaleString('ru')}`);
    } else if (publishStatus === 'draft') {
      toast('Событие сохранено как черновик');
    } else {
      toast(id ? 'Событие обновлено' : 'Событие создано и опубликовано');
    }
    
    // Если push-уведомление запланировано, показываем информацию
    if (pushTemplate && pushSchedule) {
      const scheduleDate = new Date(pushSchedule);
      toast(`Push запланирован на ${scheduleDate.toLocaleString('ru')}`);
    }
    
    renderEvents(); 
  }
}

async function syncIikoProducts() {
  toast('Синхронизация с iiko...');
  const r = await api('POST', '/api/iiko/sync/api');
  if (r) {
    toast(`✅ +${r.added} новых, ~${r.updated} обновлено, ${r.total} всего`);
    renderProducts();
  }
}

async function uploadExcel(input) {
  const file = input.files[0];
  if (!file) return;
  const fd = new FormData();
  fd.append('file', file);
  toast('Загружаем файл...');
  const r = await api('POST', '/api/iiko/upload/products', fd, true);
  if (r) {
    toast(`✅ Загружено: +${r.added} новых, ~${r.updated} обновлено, ×${r.skipped} пропущено`);
    renderProducts();
  }
  input.value = '';
}

function filterProds() {
  const q = document.getElementById('p-q').value.toLowerCase();
  const c = document.getElementById('p-cat').value;
  const photo = document.getElementById('p-photo').value;
  const filtered = _prods.filter(p => {
    const cat = p.category_override || p.category;
    if (q && !p.name.toLowerCase().includes(q)) return false;
    if (c && cat !== c) return false;
    if (photo === 'with' && !p.image_url) return false;
    if (photo === 'without' && p.image_url) return false;
    return true;
  });
  renderProdsTable(filtered);
}

// Загрузка нескольких фото
async function uploadProdImgs(id) {
  const files = document.getElementById('pm-file').files;
  if(!files.length){toast('Выберите файл','err');return;}
  for(const f of files){
    const fd=new FormData(); fd.append('image',f);
    const u = await api('POST','/api/admin/upload/image?type=product',fd,true); if(!u) continue;
    const r = await api('POST',`/api/admin/products/${id}/images`,{url:u.url}); if(!r) continue;
    const imgs = r.meta?.images||[]; const last=imgs[imgs.length-1];
    if(last){
      const d=document.createElement('div'); d.className='img-item'; d.id=`ii-${last.id}`;
      d.draggable=true;
      d.setAttribute('ondragstart',`dragStart(event,'${last.id}')`);
      d.setAttribute('ondragover','event.preventDefault()');
      d.setAttribute('ondrop',`dragDrop(event,'${last.id}','${id}')`);
      d.innerHTML=`<img src="${last.url}"><button class="del-img" onclick="delProdImg('${id}','${last.id}')">×</button>`;
      document.getElementById('pm-imgs').appendChild(d);
    }
  }
  document.getElementById('pm-file').value=''; toast('Фото загружены');
}

async function delProdImg(pid,iid) {
  if(!confirm('Удалить фото?')) return;
  const r=await api('DELETE',`/api/admin/products/${pid}/images/${iid}`);
  if(r){ document.getElementById(`ii-${iid}`)?.remove(); toast('Удалено'); }
}

// Drag-and-drop для порядка фото
let _dragId = null;
function dragStart(e, imgId) { _dragId = imgId; e.dataTransfer.effectAllowed='move'; }
async function dragDrop(e, targetId, productId) {
  e.preventDefault();
  if(!_dragId || _dragId===targetId) return;
  const grid = document.getElementById('pm-imgs');
  const items = [...grid.querySelectorAll('.img-item')];
  const fromEl = document.getElementById(`ii-${_dragId}`);
  const toEl   = document.getElementById(`ii-${targetId}`);
  if(!fromEl||!toEl) return;
  // Меняем DOM
  const fromIdx = items.indexOf(fromEl);
  const toIdx   = items.indexOf(toEl);
  if(fromIdx < toIdx) toEl.after(fromEl); else toEl.before(fromEl);
  // Сохраняем новый порядок
  const newOrder = [...grid.querySelectorAll('.img-item')].map(el => {
    const iid = el.id.replace('ii-','');
    const img = el.querySelector('img');
    return { id: iid, url: img?.src?.replace(location.origin,'') || img?.getAttribute('src') };
  });
  await api('PUT',`/api/admin/products/${productId}/images/reorder`, newOrder);
  toast('Порядок сохранён');
  _dragId = null;
}

async function uploadSystemImage(name, input) {

function renderGalleryGrid() {
  const w = document.getElementById('g-wrap');
  if (!w) return;
  if (!_gallery.length) { w.innerHTML='<p class="empty">Фото пока нет</p>'; return; }
  w.innerHTML = `<div class="gallery-grid">${_gallery.map((g,i)=>`
    <div class="gallery-item" id="gi-${g._id}">
      <div class="gi-order">#${g.order??i}</div>
      <img src="${g.image_url}" loading="lazy">
      <div class="gi-caption">${g.caption||'<span style="opacity:.4">Без описания</span>'}</div>
      <div class="gi-actions">
        <button class="btn btn-ghost btn-sm" onclick="moveGallery('${g._id}',-1)" title="Выше">↑</button>
        <button class="btn btn-ghost btn-sm" onclick="moveGallery('${g._id}',1)" title="Ниже">↓</button>
        <button class="btn btn-ghost btn-sm" onclick="editCaption('${g._id}','${(g.caption||'').replace(/'/g,"\\'")}')">✏️</button>

function openGalleryUpload() {
  openModal(`<div class="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <h3>Добавить фото в галерею</h3>
    <div class="form-group"><label>Фото *</label><input type="file" id="gu-file" accept="image/*"></div>

    <div class="form-actions">
      <button class="btn btn-primary" onclick="uploadGallery()">Загрузить</button>
      <button class="btn btn-ghost" onclick="closeModal()">Отмена</button>
    </div></div>`);
}

async function uploadGallery() {
  const f=document.getElementById('gu-file').files[0]; if(!f){toast('Выберите файл','err');return;}
  const fd=new FormData(); fd.append('image',f); fd.append('caption',document.getElementById('gu-cap').value);
  const r=await api('POST','/api/admin/gallery',fd,true);
  if(r){ closeModal(); toast('Фото добавлено'); _gallery=await api('GET','/api/admin/gallery')||[]; renderGalleryGrid(); }
}

async function deleteGallery(id) {
  if(!confirm('Удалить фото?')) return;
  await api('DELETE',`/api/admin/gallery/${id}`);
  _gallery=_gallery.filter(g=>g._id!==id); renderGalleryGrid(); toast('Удалено');
}

async function editCaption(id, current) {
  const cap=prompt('Описание фото:', current); if(cap===null) return;
  const r=await api('PUT',`/api/admin/gallery/${id}`,{caption:cap});
  if(r){ const g=_gallery.find(x=>x._id===id); if(g) g.caption=cap; renderGalleryGrid(); toast('Сохранено'); }
}

async function moveGallery(id, dir) {
  const idx=_gallery.findIndex(g=>g._id===id); if(idx<0) return;
  const swapIdx=idx+dir; if(swapIdx<0||swapIdx>=_gallery.length) return;
  [_gallery[idx].order, _gallery[swapIdx].order] = [_gallery[swapIdx].order, _gallery[idx].order];
  [_gallery[idx], _gallery[swapIdx]] = [_gallery[swapIdx], _gallery[idx]];
  await api('PUT','/api/admin/gallery/reorder', _gallery.map((g,i)=>({id:g._id, order:i})));
  renderGalleryGrid();
}

async function saveNews(id) {
  const title = document.getElementById('nf-title').value.trim();
  if (!title) { toast('Введите заголовок', 'err'); return; }
  const pubTime = document.getElementById('nf-pub-time').value;
  const pushTime = document.getElementById('nf-push-time').value;
  const isPublished = document.getElementById('nf-published').value === 'true';

  const body = {
    title,
    description: document.getElementById('nf-desc').value,
    image_url: document.getElementById('nf-img').value,
    is_published: pubTime ? false : isPublished,
    auto_publish: !!pubTime,
    scheduled_publish_time: pubTime ? new Date(pubTime).toISOString() : null,
    push_template: document.getElementById('nf-push').value.trim(),
    scheduled_push_time: pushTime ? new Date(pushTime).toISOString() : null,
  };

  const r = id ? await api('PUT', `/api/admin/news/${id}`, body) : await api('POST', '/api/admin/news', body);
  if (r) { closeModal(); toast(id ? 'Обновлено' : 'Создано'); renderNews(); }
}

  const r = await api('POST', `/api/admin/news/${id}/publish-now`);

}

async function sendNewsPushNow(id) {
  const r = await api('POST', `/api/admin/news/${id}/send-push-now`);

}

async function deleteNews(id) {

  if (r) { toast('Удалено'); renderNews(); }
}

        <span class="badge ${o.delivery_type === 'delivery' ? 'badge-orange' : 'badge-blue'}">
          ${o.delivery_type === 'delivery' ? 'Доставка' : 'На месте'}
        </span>
        ${o.delivery_type === 'delivery' && o.delivery_address ? `<br><span style="color:var(--muted);font-size:12px">${o.delivery_address}</span>` : ''}
      </td>
      <td style="font-size:13px">${(o.items||[]).map(i=>`${i.name} ×${i.qty}`).join('<br>')}</td>
      <td style="color:var(--gold);font-weight:700">${Number(o.total).toLocaleString('ru')} ₽</td>
      <td>
        <select onchange="changeOrderPaymentStatus('${o._id}',this.value)" style="font-size:11px;font-weight:700;padding:4px 8px;border-radius:6px;border:1px solid;outline:none;cursor:pointer;
          ${o.payment_status === 'paid' 
            ? 'background:rgba(76,175,80,.15);color:#4CAF50;border-color:rgba(76,175,80,.3)' 
            : 'background:rgba(229,57,53,.15);color:#E53935;border-color:rgba(229,57,53,.3)'}">
          <option value="unpaid" ${o.payment_status!=='paid'?'selected':''}>Не оплачен</option>
          <option value="paid" ${o.payment_status==='paid'?'selected':''}>Оплачен</option>
        </select>
      </td>
      <td><span class="badge ${statusColors[o.status]||'badge-blue'}">${statusLabels[o.status]||o.status}</span></td>
      <td style="font-size:12px;color:var(--muted)">${fmtDate(o.created_at)}</td>
      <td>
        <select onchange="changeOrderStatus('${o._id}',this.value)" style="font-size:12px;padding:4px 8px;border-radius:6px;background:var(--surface2);color:var(--text);border:1px solid var(--border)">
          ${['pending','confirmed','ready','completed','cancelled'].map(s=>`<option value="${s}" ${o.status===s?'selected':''}>${statusLabels[s]}</option>`).join('')}
        </select>
      </td>
    </tr>`).join('')}</tbody></table>`;
}

function fmtDate(d) { return d ? new Date(d).toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—'; }

async function changeOrderStatus(id, status) {
  const r = await api('PUT',`/api/admin/orders/${id}/status`,{status});
  if(r) { toast('Статус обновлён'); renderOrders(); }
}

async function changeOrderPaymentStatus(id, payment_status) {
  const r = await api('PUT',`/api/admin/orders/${id}/payment`,{payment_status});
  if(r) { toast('Статус оплаты обновлён'); renderOrders(); }
}

let _qrScanner = null;
let _qrScanning = true;
let _currentUserId = null;

function renderCashier() {
  document.getElementById('main').innerHTML = `
    <div class="page-header"><h1>Касса</h1></div>

      <input id="usb-scanner-input" type="text"

      <div class="cashier-scanner">

          <p class="scan-hint">Или наведите камеру на QR-код гостя</p>

          </div>
        </div>
      </div>

        <div class="guest-card" id="guest-card">
          <div class="guest-name" id="guest-name">—</div>

          <div class="guest-row">
            <span class="guest-row-label">Бонусный баланс</span>
            <span class="guest-row-value" id="guest-balance">—</span>
          </div>
          <div class="guest-row">
            <span class="guest-row-label">Статус</span>
            <span class="guest-row-value" id="guest-status">—</span>
          </div>
          <div class="accrue-block">

function initUsbScanner() {
  const input = document.getElementById('usb-scanner-input');
  if (!input) return;

  // USB-сканер вводит данные быстро и нажимает Enter
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      processUsbScan();
    }
  });

  // Автофокус убран — не мешает поиску пользователей
  // Кассир кликает на USB поле когда нужно сканировать
}

async function processUsbScan() {
  const input = document.getElementById('usb-scanner-input');
  if (!input) {
    console.error('[USB] Поле ввода не найдено');
    return;
  }
  const text = input.value.trim();
  if (!text) {
    toast('Введите данные QR-кода', 'err');
    return;
  }
  console.log('[USB] Обработка:', text);
  console.log('[USB] Длина:', text.length);
  input.value = '';
  
  // Сбрасываем состояние перед новым сканированием
  _qrScanning = true;
  
  await onQRSuccess(text);
}

function startQRScanner() {
  if (_qrScanner) {
    try {
      _qrScanner.stop().catch(() => {});
    } catch (e) {
      console.log('[QR] Ошибка остановки сканера:', e);
    }
    _qrScanner = null;
  }
  
  try {
    _qrScanner = new Html5Qrcode('qr-reader');
    _qrScanner.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 240, height: 240 } },
      onQRSuccess,
      () => {}
    ).catch(() => {
      // Fallback — попробуем любую камеру
      Html5Qrcode.getCameras().then(cameras => {
        if (!cameras.length) { 
          console.log('[QR] Камера не найдена, используйте USB-сканер');
          return; 
        }
        _qrScanner.start(
          cameras[0].id,
          { fps: 10, qrbox: { width: 240, height: 240 } },
          onQRSuccess,
          () => {}
        ).catch(e => {
          console.log('[QR] Нет доступа к камере:', e);
        });
      }).catch(() => {
        console.log('[QR] Камера недоступна, используйте USB-сканер');
      });
    });
  } catch (e) {
    console.error('[QR] Ошибка инициализации сканера:', e);
  }
}

async function onQRSuccess(text) {
  console.log('[QR] onQRSuccess вызван, _qrScanning:', _qrScanning);
  
  if (!_qrScanning) {
    console.log('[QR] Пропускаем - уже обрабатывается');
    return;
  }
  
  _qrScanning = false;
  console.log('[QR] Установлен _qrScanning = false');
  
  if (_qrScanner) {
    try {
      _qrScanner.pause();
      console.log('[QR] Сканер поставлен на паузу');
    } catch (e) {
      console.log('[QR] Не удалось поставить на паузу:', e.message);
    }
  }

  try {
    console.log('[QR] Отправка запроса на /api/bonus/qr/verify');
    console.log('[QR] Данные:', text);
    
    const resp = await fetch('/api/bonus/qr/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${TOKEN}` },
      body: JSON.stringify({ qr_data: text }),
    });
    
    console.log('[QR] Статус ответа:', resp.status);
    const data = await resp.json();
    console.log('[QR] Ответ сервера:', data);

    if (!data.valid) {
      const reasons = {
        expired: 'QR-код устарел (более 5 минут)',
        invalid_signature: 'Недействительный QR-код',
        missing_fields: 'Неверный формат QR',
        invalid_json: 'Неверный формат JSON',
      };
      const errorMsg = reasons[data.reason] || `QR-код недействителен (${data.reason})`;
      console.error('[QR] Ошибка валидации:', errorMsg);
      showQRError(errorMsg);
      return;
    }

    console.log('[QR] QR-код валиден, показываем карточку гостя');
    _currentUserId = data.userId;
    
    const guestCard = document.getElementById('guest-card');
    const guestEmpty = document.getElementById('guest-empty');
    const qrError = document.getElementById('qr-error');
    
    console.log('[QR] Элементы:', {
      guestCard: !!guestCard,
      guestEmpty: !!guestEmpty,
      qrError: !!qrError
    });
    
    document.getElementById('guest-name').textContent    = data.userName || 'Гость';
    document.getElementById('guest-phone').textContent   = data.phone;
    document.getElementById('guest-balance').textContent = (data.bonus_balance ?? 0) + ' баллов';
    document.getElementById('guest-status').textContent  = data.loyalty_status || 'Бронза';
    
    guestCard.classList.add('visible');
    guestEmpty.style.display = 'none';
    qrError.classList.remove('visible');
    
    document.getElementById('purchase-amount').value = '';
    document.getElementById('accrue-preview').textContent = '';
    document.getElementById('accrue-result').style.display = 'none';
    document.getElementById('accrue-btn').disabled = true;
    
    console.log('[QR] Карточка гостя показана');
    toast('✅ Гость найден: ' + (data.userName || 'Гость'));
  } catch (e) {
    console.error('[QR] Ошибка:', e);
    showQRError('Ошибка соединения с сервером: ' + e.message);
  }
}

function showQRError(msg) {
  document.getElementById('qr-error-text').textContent = msg;
  document.getElementById('qr-error').classList.add('visible');
  document.getElementById('guest-card').classList.remove('visible');
}

function resetQR() {
  _qrScanning = true;
  _currentUserId = null;
  document.getElementById('guest-card').classList.remove('visible');
  document.getElementById('guest-empty').style.display = 'block';
  document.getElementById('qr-error').classList.remove('visible');
  if (_qrScanner) {
    try {
      _qrScanner.resume();
    } catch (e) {
      console.log('[QR] Не удалось возобновить сканирование:', e);
    }
  }
}

function updateAccruePreview() {
  const amount = Number(document.getElementById('purchase-amount').value);
  const preview = document.getElementById('accrue-preview');
  const btn = document.getElementById('accrue-btn');
  if (!amount || amount <= 0) { preview.textContent = ''; btn.disabled = true; return; }
  const bonus = Math.floor(amount * 0.03);
  if (bonus < 1) {
    preview.textContent = '⚠ Сумма слишком мала (минимум 34 ₽)';
    preview.className = 'accrue-preview warn';
    btn.disabled = true;
  } else {
    preview.textContent = `+ ${bonus} бонусов будет начислено`;
    preview.className = 'accrue-preview';
    btn.disabled = false;
  }
}

async function doAccrue() {
  const amount = Number(document.getElementById('purchase-amount').value);
  const btn = document.getElementById('accrue-btn');
  const result = document.getElementById('accrue-result');
  if (!_currentUserId || !amount) return;

  btn.disabled = true; btn.textContent = '...';
  result.style.display = 'none';

  try {
    const r = await api('POST', '/api/bonus/accrue', { userId: _currentUserId, purchaseAmount: amount });
    if (r) {
      result.textContent = `✅ Начислено ${r.accrued} бонусов! Новый баланс: ${r.newBalance} баллов`;
      result.className = 'accrue-result ok';
      document.getElementById('guest-balance').textContent = r.newBalance + ' баллов';
      document.getElementById('guest-status').textContent  = r.loyalty_status;
      document.getElementById('purchase-amount').value = '';
      document.getElementById('accrue-preview').textContent = '';
    } else {
      result.textContent = '❌ Ошибка начисления';
      result.className = 'accrue-result err';
    }
  } catch(e) {
    result.textContent = '❌ ' + e.message;
    result.className = 'accrue-result err';
  } finally {
    result.style.display = 'block';
    btn.textContent = 'Начислить';
    btn.disabled = false;
  }
}

async function renderCategories() {
  document.getElementById('main').innerHTML = `
    <div class="page-header"><h1>🏷️ Категории</h1><button class="btn btn-primary" onclick="openCatForm()">+ Добавить</button></div>
    <div class="card" id="cat-wrap"><p class="empty">Загрузка...</p></div>`;
  const cats = await api('GET','/api/admin/categories'); if(!cats) return;
  renderCatsTable(cats);
}

function renderCatsTable(cats) {
  const w = document.getElementById('cat-wrap');
  if(!cats.length){w.innerHTML='<p class="empty">Категорий пока нет</p>';return;}
  w.innerHTML=`<table><thead><tr><th>Название</th><th>Порядок</th><th>Статус</th><th></th></tr></thead>
    <tbody>${cats.map(c=>`<tr>
      <td><strong>${c.name}</strong></td>
      <td>${c.sort_order??'—'}</td>
      <td><span class="badge ${c.is_active?'badge-green':'badge-red'}">${c.is_active?'Активна':'Скрыта'}</span></td>
      <td style="white-space:nowrap">
        <button class="btn btn-ghost btn-sm" onclick="openCatForm('${c._id}')">✏️</button>
        <button class="btn btn-ghost btn-sm" onclick="toggleCat('${c._id}',${!c.is_active})">${c.is_active?'🙈':'👁️'}</button>
        <button class="btn btn-danger btn-sm" onclick="deleteCat('${c._id}')">🗑️</button>
      </td></tr>`).join('')}</tbody></table>`;
}

function openCatForm(id='') {
  const cats = window._catsCache||[];
  const c = cats.find(x=>x._id===id)||{};
  openModal(`<div class="modal" style="width:420px">
    <button class="modal-close" onclick="closeModal()">×</button>
    <h3>${id?'Редактировать':'Новая'} категория</h3>
    <div class="form-group"><label>Название *</label><input id="cf-name" value="${c.name||''}"></div>
    <div class="form-row">
      <div class="form-group"><label>Порядок</label><input id="cf-order" type="number" value="${c.sort_order??0}"></div>
      <div class="form-group"><label>Статус</label>
        <select id="cf-active"><option value="true" ${c.is_active!==false?'selected':''}>Активна</option><option value="false" ${c.is_active===false?'selected':''}>Скрыта</option></select>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="saveCat('${id}')">💾 Сохранить</button>
      <button class="btn btn-ghost" onclick="closeModal()">Отмена</button>
    </div></div>`);
}

async function saveCat(id) {
  const name = document.getElementById('cf-name').value.trim();
  if(!name){toast('Введите название','err');return;}
  const body = { name, sort_order:+document.getElementById('cf-order').value||0, is_active:document.getElementById('cf-active').value==='true' };
  const r = id ? await api('PUT',`/api/admin/categories/${id}`,body) : await api('POST','/api/admin/categories',body);
  if(r){ closeModal(); toast(id?'Обновлено':'Создано'); renderCategories(); }
}

async function toggleCat(id, val) {
  await api('PUT',`/api/admin/categories/${id}`,{is_active:val});
  toast('Статус изменён'); renderCategories();
}

async function deleteCat(id) {
  if(!confirm('Удалить категорию?')) return;
  const r = await api('DELETE',`/api/admin/categories/${id}`);
  if(r){ toast('Удалено'); renderCategories(); }
}
